<!DOCTYPE html>
<html>
<head>
<script src="https://unpkg.com/pagedjs/dist/js/paged.polyfill.js"></script>
<style>
  a::after { content: target-counter(attr(href), page); }
</style>
</head>
<body>
  <a href="#test">Link to Test</a>
  <div style="break-before: page; height: 100vh;">Page 2</div>
  <div id="test" style="break-before: page;">This is test on page 3</div>
</body>
</html>
